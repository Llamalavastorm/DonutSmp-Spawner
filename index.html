<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerux's Spawner Market • Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
        }
        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .discord-preview {
            background: #313338;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .discord-embed {
            background: #2b2d31;
            border-left: 4px solid #a51d21; /* Default, will be overridden by JS */
            border-radius: 4px;
        }
        .discord-code {
            background: #1e1f22;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #6b21a8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9333ea; }

        /* Color Picker Styling */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body class="py-10 px-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/59928e2d-b01b-477c-acf9-a6369d05e9f0-profile_image-70x70.png" class="w-16 h-16 rounded-full shadow-lg shadow-purple-500/50">
                <div>
                    <h1 class="text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">AERUX'S MARKET</h1>
                    <p class="text-purple-200 font-medium">Visual Embed Generator</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="copyJson()" class="glass px-6 py-3 rounded-xl hover:bg-white/10 transition-colors font-bold text-sm tracking-wide">
                    <i class="fa-solid fa-copy mr-2"></i> COPY JSON
                </button>
                <button onclick="sendEmbed()" class="bg-gradient-to-r from-purple-600 to-pink-600 px-6 py-3 rounded-xl hover:scale-105 transition-all font-bold text-sm tracking-wide shadow-lg shadow-purple-600/30">
                    <i class="fa-solid fa-paper-plane mr-2"></i> SEND TO DISCORD
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 space-y-6">
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-gear text-purple-400"></i> Settings</h2>
                    
                    <div class="mb-4">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Discord Webhook URL</label>
                        <input id="webhook" type="text" placeholder="https://discord.com/api/webhooks/..." class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-sm focus:border-purple-500 outline-none transition-colors">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Banner Image URL</label>
                            <input id="bannerUrl" type="text" class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-sm focus:border-purple-500 outline-none transition-colors mb-2" oninput="updateUI()">
                            
                            <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1 block">Quick Select Banners:</span>
                            <div id="bannerGallery" class="flex gap-2 overflow-x-auto pb-2 items-center">
                                </div>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Embed Color</label>
                            <div class="flex items-center gap-3 bg-black/50 border border-white/10 rounded-lg p-2 h-[46px] focus-within:border-purple-500 transition-colors">
                                <input type="color" id="embedColor" value="#a51d21" class="h-full w-12 cursor-pointer bg-transparent" oninput="syncColorFromPicker()">
                                <input type="text" id="hexInput" value="#A51D21" maxlength="7" class="w-full bg-transparent text-sm font-mono text-gray-300 font-bold uppercase outline-none" oninput="syncColorFromHex()">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass rounded-2xl p-6 border-t-4 border-t-green-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-money-bill-wave text-green-400"></i> Our Buying Prices</h2>
                        <button onclick="addItem('buying')" class="text-xs bg-green-500/20 text-green-400 px-3 py-1.5 rounded-lg hover:bg-green-500/40 transition"><i class="fa-solid fa-plus"></i> ADD ITEM</button>
                    </div>
                    <div id="buyingList" class="space-y-3"></div>
                </div>

                <div class="glass rounded-2xl p-6 border-t-4 border-t-red-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-cart-shopping text-red-400"></i> Our Selling Prices</h2>
                        <button onclick="addItem('selling')" class="text-xs bg-red-500/20 text-red-400 px-3 py-1.5 rounded-lg hover:bg-red-500/40 transition"><i class="fa-solid fa-plus"></i> ADD ITEM</button>
                    </div>
                    <div id="sellingList" class="space-y-3"></div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="sticky top-6">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm font-bold text-gray-400 tracking-wider uppercase"><i class="fa-brands fa-discord mr-2"></i> Live Preview</span>
                        <span id="status" class="text-xs font-bold"></span>
                    </div>
                    
                    <div class="discord-preview p-4">
                        <div class="flex gap-4 mb-2">
                            <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/59928e2d-b01b-477c-acf9-a6369d05e9f0-profile_image-70x70.png" class="w-10 h-10 rounded-full mt-1">
                            <div class="w-full">
                                <div class="flex items-baseline gap-2">
                                    <span class="font-medium text-green-500 hover:underline cursor-pointer">Aerux's Spawner Market</span>
                                    <span class="text-xs bg-[#5865F2] text-white px-1.5 rounded uppercase font-semibold" style="font-size: 10px; padding: 2px 4px;">APP</span>
                                    <span class="text-xs text-gray-400">Today at 12:00 PM</span>
                                </div>
                                
                                <div class="discord-embed mt-2 p-4 w-full max-w-[400px]">
                                    <img id="previewBanner" src="" class="rounded w-full object-cover">
                                </div>

                                <div class="discord-embed mt-2 p-4 w-full max-w-[400px]">
                                    <div class="mb-4">
                                        <div class="font-bold text-white mb-1">💵 __**OUR BUYING PRICES:**__</div>
                                        <div id="previewBuying" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap"></div>
                                    </div>
                                    <div class="mb-4">
                                        <div class="font-bold text-white mb-1">🛒 __**OUR SELLING PRICES:**__</div>
                                        <div id="previewSelling" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap"></div>
                                    </div>
                                    
                                    <div class="flex items-center gap-2 mt-4 pt-2">
                                        <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/59928e2d-b01b-477c-acf9-a6369d05e9f0-profile_image-70x70.png" class="w-5 h-5 rounded-full">
                                        <span class="text-xs text-gray-400">Open Ticket In Ticket Channel To Buy/Sell The Stock...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ADD YOUR PREDEFINED BANNERS & COLORS HERE
        // ==========================================
        // You can add as many as you want in this array.
        // It requires a 'url' for the image, and a 'color' hex code.
        const PREDEFINED_BANNERS = [
            { url: "https://i.postimg.cc/vDwmVrkV/fontbolt.png", color: "#7D00B8" },
            { url: "https://i.postimg.cc/Lsb3VR7x/Orange-Spawner.png", color: "#FFAE42" },
            { url: "https://i.postimg.cc/YSWTgXDG/Marvel-spawner.png", color: "#7E1111" },
            { url: "https://i.postimg.cc/MHy0xBGt/Yellow-Spawner.png", color: "#DAB80B" },
            { url: "https://i.postimg.cc/vTsycRQb/Lego-Spawner.png", color: "#EA0606" },
            { url: "https://i.postimg.cc/x8tZYBq0/Pink-Spawner.png", color: "#FF00D0" },
            { url: "https://i.postimg.cc/Kz3rqwhj/Red-Spawner.png", color: "#FF0A0A" }
        ];

        // State Management
        let state = {
            buying: [
                { name: "Skeleton Spawner", price: "4.4M" },
                { name: "Iron Golem Spawner", price: "4.2M" },
                { name: "Pig Spawner", price: "2M" },
                { name: "Cow Spawner", price: "1.5M" },
                { name: "Zombie Spawner", price: "325K" },
                { name: "Zombified Piglin Spawner", price: "4.1M" },
                { name: "Spider Spawner", price: "1M" },
                { name: "Blaze Spawner", price: "1.7M" },
                { name: "Creeper Spawner", price: "4M" }
            ],
            selling: [
                { name: "Skeleton Spawner", price: "5M" },
                { name: "Iron Golem Spawner", price: "7M" }
            ]
        };

        // Utility: Capitalize words
        function toTitleCase(str) {
            return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        // Initialize Banner Gallery
        function initGallery() {
            const gallery = document.getElementById('bannerGallery');
            document.getElementById('bannerUrl').value = PREDEFINED_BANNERS[0].url; // Set default
            
            // Set initial color based on default banner
            document.getElementById('embedColor').value = PREDEFINED_BANNERS[0].color;
            document.getElementById('hexInput').value = PREDEFINED_BANNERS[0].color;

            PREDEFINED_BANNERS.forEach(banner => {
                gallery.innerHTML += `
                    <img src="${banner.url}" 
                         onclick="selectBanner('${banner.url}', '${banner.color}')"
                         class="h-10 w-24 object-cover rounded cursor-pointer border-2 border-transparent hover:border-purple-500 transition-all flex-shrink-0 bg-black/50" 
                         title="Click to select this banner">
                `;
            });
        }

        // Action when a banner preset is clicked
        function selectBanner(url, color) {
            document.getElementById('bannerUrl').value = url;
            document.getElementById('embedColor').value = color;
            document.getElementById('hexInput').value = color.toUpperCase();
            updateUI();
        }

        // Sync Hex Input when Color Picker changes
        function syncColorFromPicker() {
            const val = document.getElementById('embedColor').value;
            document.getElementById('hexInput').value = val.toUpperCase();
            updateUI();
        }

        // Sync Color Picker when Hex Input changes
        function syncColorFromHex() {
            let val = document.getElementById('hexInput').value.trim();
            // Automatically add hash if missing
            if (!val.startsWith('#')) val = '#' + val;
            
            // Only update the actual color picker if it's a valid 6-character hex
            if(/^#[0-9A-F]{6}$/i.test(val)) {
                document.getElementById('embedColor').value = val;
                updateUI();
            }
        }

        // Render input lists
        function renderLists() {
            const renderCategory = (category, containerId) => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                state[category].forEach((item, index) => {
                    container.innerHTML += `
                        <div class="flex gap-3 items-center bg-black/40 p-2 rounded-lg border border-white/5 hover:border-white/20 transition-colors">
                            <input type="text" value="${item.name}" oninput="updateItem('${category}', ${index}, 'name', this.value)" placeholder="Spawner Name" class="w-full bg-transparent outline-none text-sm px-2 text-white">
                            <span class="text-gray-500 font-bold">$</span>
                            <input type="text" value="${item.price}" oninput="updateItem('${category}', ${index}, 'price', this.value)" placeholder="Price (e.g. 4M)" class="w-24 bg-black/50 border border-white/10 rounded px-2 py-1 text-sm outline-none text-center focus:border-purple-500">
                            <button onclick="removeItem('${category}', ${index})" class="text-red-400 hover:text-red-300 px-2 transition"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    `;
                });
            };
            renderCategory('buying', 'buyingList');
            renderCategory('selling', 'sellingList');
        }

        // CRUD Operations
        function addItem(category) {
            state[category].push({ name: "New Spawner", price: "1M" });
            updateUI();
        }
        function removeItem(category, index) {
            state[category].splice(index, 1);
            updateUI();
        }
        function updateItem(category, index, field, value) {
            state[category][index][field] = value;
            updatePreview(); // Only update preview to prevent input losing focus
        }

        // Convert Hex to Decimal Color for Discord API
        function getDiscordColor() {
            const hex = document.getElementById('embedColor').value;
            return parseInt(hex.replace('#', ''), 16);
        }

        // Build the final Discord JSON string
        function generateJSON() {
            const formatLines = (items) => {
                return items.map(i => {
                    const cleanName = toTitleCase(i.name.trim() || "Item");
                    const cleanPrice = i.price.trim() || "0";
                    return `**${cleanName}** = $ \`${cleanPrice}\` Each`;
                }).join('\n');
            };

            const decimalColor = getDiscordColor();

            return {
                "username": "Aerux's Spawner Market",
                "avatar_url": "https://static-cdn.jtvnw.net/jtv_user_pictures/59928e2d-b01b-477c-acf9-a6369d05e9f0-profile_image-70x70.png",
                "embeds": [
                    {
                        "color": decimalColor,
                        "image": { "url": document.getElementById('bannerUrl').value.trim() }
                    },
                    {
                        "description": "",
                        "color": decimalColor,
                        "fields": [
                            {
                                // Using Custom Emojis for the JSON Payload
                                "name": "<:cash:1487108179648188478> __**OUR BUYING PRICES:**__",
                                "value": formatLines(state.buying) + (state.buying.length ? "\n\n" : ""),
                                "inline": false
                            },
                            {
                                // Using Custom Emojis for the JSON Payload
                                "name": "<:Buy:1487108111390081134> __**OUR SELLING PRICES:**__",
                                "value": formatLines(state.selling),
                                "inline": false
                            }
                        ],
                        "footer": {
                            "text": "Open Ticket In Ticket Channel To Buy/Sell The Stock...",
                            "icon_url": "https://static-cdn.jtvnw.net/jtv_user_pictures/59928e2d-b01b-477c-acf9-a6369d05e9f0-profile_image-70x70.png"
                        }
                    }
                ]
            };
        }

        // Update the visual Discord preview
        function updatePreview() {
            // Update Banner
            document.getElementById('previewBanner').src = document.getElementById('bannerUrl').value.trim() || 'https://via.placeholder.com/400x100?text=No+Banner';
            
            // Update Embed borders based on color picker
            const colorHex = document.getElementById('embedColor').value;
            document.querySelectorAll('.discord-embed').forEach(el => {
                el.style.borderLeftColor = colorHex;
            });

            // Format Items for Web Preview
            const formatHtml = (items) => {
                return items.map(i => {
                    const cleanName = toTitleCase(i.name.trim() || "Item");
                    const cleanPrice = i.price.trim() || "0";
                    return `<strong>${cleanName}</strong> = $ <span class="discord-code">${cleanPrice}</span> Each`;
                }).join('<br>');
            };

            document.getElementById('previewBuying').innerHTML = formatHtml(state.buying);
            document.getElementById('previewSelling').innerHTML = formatHtml(state.selling);
        }

        function updateUI() {
            renderLists();
            updatePreview();
        }

        // Action Buttons
        function copyJson() {
            const jsonStr = JSON.stringify(generateJSON(), null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => {
                showStatus("✅ Copied to clipboard!", "text-green-400");
            });
        }

        async function sendEmbed() {
            const webhookUrl = document.getElementById("webhook").value.trim();
            if (!webhookUrl) {
                showStatus("❌ Please enter a webhook URL", "text-red-400");
                return;
            }

            showStatus("⏳ Sending...", "text-yellow-400");
            const payload = generateJSON();

            try {
                const response = await fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showStatus("✅ Message Sent!", "text-green-400");
                } else {
                    showStatus(`❌ Discord Error: ${response.status}`, "text-red-400");
                }
            } catch (err) {
                showStatus("❌ Failed to send request", "text-red-400");
            }
        }

        function showStatus(message, colorClass) {
            const statusEl = document.getElementById("status");
            statusEl.className = `text-xs font-bold ${colorClass}`;
            statusEl.innerText = message;
            setTimeout(() => statusEl.innerText = "", 4000);
        }

        // Initialize on load
        window.onload = () => {
            initGallery();
            updateUI();
        };
    </script>
</body>
</html>
